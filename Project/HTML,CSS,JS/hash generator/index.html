<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hash Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0C0F1A;
      --surface:     #131726;
      --surface2:    #1B1F30;
      --surface3:    #242840;
      --border:      #2A2E45;
      --border-hi:   #3C4060;
      --grad-a:      #7C6DFF;
      --grad-b:      #00D4FF;
      --accent:      #9B7FFF;
      --accent-dim:  #9B7FFF18;
      --success:     #3FB950;
      --success-bg:  #3FB95018;
      --error:       #FF7B72;
      --error-bg:    #FF7B7218;
      --text:        #E8EAF6;
      --text-soft:   #A8AECC;
      --muted:       #555A7A;
      --mono:        'Space Mono', monospace;
      --sans:        'Inter', sans-serif;
      --radius:      10px;
      --radius-sm:   6px;
      --radius-lg:   14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-image:
        radial-gradient(ellipse 70% 50% at 20% -10%, rgba(124,109,255,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 110%, rgba(0,212,255,0.05) 0%, transparent 60%),
        linear-gradient(rgba(124,109,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,109,255,0.025) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 28px 28px, 28px 28px;
    }

    /* ── Header ── */
    header {
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(12,15,26,0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      position: sticky;
      top: 0;
      z-index: 10;
      gap: 12px;
    }

    .header-left { display: flex; align-items: center; gap: 14px; }

    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--grad-a) 0%, var(--grad-b) 100%);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono);
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 0 20px rgba(124,109,255,0.45), 0 2px 8px rgba(0,0,0,0.4);
      flex-shrink: 0;
    }

    .logo-text {
      font-family: var(--mono);
      font-size: 0.95rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--grad-a), var(--grad-b));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-sub {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .header-right { display: flex; align-items: center; gap: 8px; }

    .badge {
      font-size: 0.64rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(155,127,255,0.25);
    }

    /* ── Buttons ── */
    .btn {
      font-family: var(--sans);
      font-size: 0.78rem;
      font-weight: 500;
      padding: 7px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-soft);
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .btn:hover { border-color: var(--border-hi); color: var(--text); background: var(--surface3); }
    .btn.ghost { background: transparent; border-color: transparent; color: var(--muted); }
    .btn.ghost:hover { background: var(--surface2); border-color: var(--border); color: var(--text-soft); }
    .btn.danger:hover { border-color: var(--error); color: var(--error); }

    .btn.copy {
      font-size: 0.72rem;
      background: transparent;
      border-color: var(--border);
      color: var(--muted);
    }
    .btn.copy:hover { border-color: var(--success); color: var(--success); }
    .btn.copy.copied { border-color: var(--success); color: var(--success); background: var(--success-bg); }

    /* ── Main ── */
    main {
      flex: 1;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      padding: 32px 24px 48px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* ── Section ── */
    .section { display: flex; flex-direction: column; gap: 10px; }

    .section-label {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, var(--border), transparent);
    }

    /* ── Textarea ── */
    .input-wrapper { position: relative; }

    textarea {
      width: 100%;
      min-height: 148px;
      font-family: var(--mono);
      font-size: 0.84rem;
      line-height: 1.75;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      color: var(--text-soft);
      padding: 16px 16px 48px;
      resize: vertical;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(155,127,255,0.12), 0 4px 20px rgba(124,109,255,0.08);
    }
    textarea::placeholder { color: var(--muted); }

    .input-footer {
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border);
      background: var(--surface2);
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
    }

    .counters {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
    }

    /* ── Algo buttons ── */
    .algo-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .algo-btn {
      font-family: var(--mono);
      font-size: 0.76rem;
      font-weight: 700;
      padding: 9px 18px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-soft);
      cursor: pointer;
      transition: all 0.16s;
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }
    .algo-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(124,109,255,0.15), rgba(0,212,255,0.08));
      opacity: 0;
      transition: opacity 0.16s;
    }
    .algo-btn:hover { border-color: var(--border-hi); color: var(--text); }
    .algo-btn:hover::before { opacity: 1; }
    .algo-btn.active {
      border-color: rgba(155,127,255,0.6);
      color: var(--text);
      box-shadow: 0 0 14px rgba(124,109,255,0.2), inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .algo-btn.active::before { opacity: 1; }

    .algo-bits {
      font-size: 0.62rem;
      color: var(--muted);
      background: var(--surface2);
      padding: 1px 6px;
      border-radius: 3px;
      transition: background 0.16s, color 0.16s;
    }
    .algo-btn.active .algo-bits {
      background: rgba(124,109,255,0.22);
      color: var(--accent);
    }

    /* ── Hash cards ── */
    .hash-cards { display: flex; flex-direction: column; gap: 10px; }

    .hash-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    .hash-card:hover { border-color: var(--border-hi); }
    .hash-card.live {
      border-color: rgba(155,127,255,0.4);
      box-shadow: 0 0 0 1px rgba(155,127,255,0.08), 0 4px 24px rgba(124,109,255,0.1);
    }

    .hash-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    .algo-name {
      font-family: var(--mono);
      font-size: 0.78rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .algo-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--border-hi);
      transition: background 0.3s, box-shadow 0.3s;
      flex-shrink: 0;
    }
    .algo-dot.ready {
      background: var(--success);
      box-shadow: 0 0 7px var(--success);
    }

    .legacy-tag {
      font-size: 0.6rem;
      color: var(--muted);
      font-weight: 400;
      background: var(--surface3);
      padding: 1px 6px;
      border-radius: 3px;
      border: 1px solid var(--border);
    }

    .hash-meta { font-family: var(--mono); font-size: 0.68rem; color: var(--muted); }

    .hash-value-wrap {
      padding: 14px 16px;
      min-height: 52px;
      display: flex;
      align-items: center;
    }

    .hash-value {
      font-family: var(--mono);
      font-size: 0.82rem;
      line-height: 1.6;
      word-break: break-all;
      color: var(--muted);
      font-style: italic;
    }
    .hash-value.ready {
      color: var(--text-soft);
      font-style: normal;
    }

    .hash-card-footer {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-top: 1px solid var(--border);
      background: rgba(27, 31, 48, 0.6);
    }

    /* ── Compare ── */
    .compare-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .compare-desc {
      font-size: 0.8rem;
      color: var(--text-soft);
      line-height: 1.5;
    }

    .compare-field {
      display: flex;
      gap: 8px;
    }

    input.compare-input {
      flex: 1;
      font-family: var(--mono);
      font-size: 0.8rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-soft);
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      min-width: 0;
    }
    input.compare-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(155,127,255,0.1);
    }
    input.compare-input::placeholder { color: var(--muted); }

    .compare-result {
      font-size: 0.8rem;
      padding: 9px 14px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      gap: 9px;
      font-weight: 500;
      border: 1px solid transparent;
      transition: all 0.2s;
    }
    .compare-result.idle { display: none; }
    .compare-result.match { background: var(--success-bg); color: var(--success); border-color: rgba(63,185,80,0.3); }
    .compare-result.no-match { background: var(--error-bg); color: var(--error); border-color: rgba(255,123,114,0.3); }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-soft);
      padding: 10px 18px;
      border-radius: var(--radius);
      font-size: 0.8rem;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.2s;
      pointer-events: none;
      z-index: 999;
      backdrop-filter: blur(8px);
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    /* ── Animate ── */
    @keyframes hashReveal {
      from { opacity: 0.3; transform: translateY(3px); }
      to   { opacity: 1;   transform: translateY(0); }
    }
    .hash-animate { animation: hashReveal 0.28s ease-out; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-hi); }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { padding: 14px 16px; }
      main { padding: 20px 16px 36px; gap: 22px; }
      .algo-btn { padding: 7px 13px; font-size: 0.72rem; }
      .hash-value { font-size: 0.76rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-icon">#</div>
    <div>
      <div class="logo-text">Hash Generator</div>
      <div class="logo-sub">Browser-native cryptographic hashing · fully offline</div>
    </div>
  </div>
  <div class="header-right">
    <div class="badge">Offline</div>
    <button class="btn danger" onclick="clearAll()">↺ Clear</button>
  </div>
</header>

<main>

  <!-- Input -->
  <div class="section">
    <div class="section-label">Input Text</div>
    <div class="input-wrapper">
      <textarea id="inputText"
        placeholder="Type or paste text — hashes update instantly…"
        oninput="onInput()"
        spellcheck="false"></textarea>
      <div class="input-footer">
        <span class="counters" id="counters">0 chars · 0 words</span>
        <button class="btn ghost" onclick="pasteText()">⌘ Paste</button>
      </div>
    </div>
  </div>

  <!-- Algorithm selector -->
  <div class="section">
    <div class="section-label">Algorithms</div>
    <div class="algo-grid" id="algoGrid"></div>
  </div>

  <!-- Hash outputs -->
  <div class="section">
    <div class="section-label">Generated Hashes</div>
    <div class="hash-cards" id="hashCards"></div>
  </div>

  <!-- Compare -->
  <div class="section">
    <div class="section-label">Verify / Compare</div>
    <div class="compare-box">
      <p class="compare-desc">Paste a known hash to check it against any of the generated values above — useful for verifying file integrity or API tokens.</p>
      <div class="compare-field">
        <input class="compare-input" id="compareInput" type="text"
          placeholder="Paste a hash to compare…"
          oninput="doCompare()"
          spellcheck="false"
          autocomplete="off" />
        <button class="btn ghost" onclick="clearCompare()">✕</button>
      </div>
      <div class="compare-result idle" id="compareResult"></div>
    </div>
  </div>

</main>

<div id="toast"></div>

<script>
/* ─── MD5 — RFC 1321, pure JS ────────────────────────── */
function md5(str) {
  function safeAdd(x, y) {
    const lsw = (x & 0xFFFF) + (y & 0xFFFF);
    const msw = (x >> 16) + (y >> 16) + (lsw >> 16);
    return (msw << 16) | (lsw & 0xFFFF);
  }
  const brl = (n, c) => (n << c) | (n >>> (32 - c));
  const cmn = (q, a, b, x, s, t) => safeAdd(brl(safeAdd(safeAdd(a, q), safeAdd(x, t)), s), b);
  const ff = (a,b,c,d,x,s,t) => cmn((b&c)|(~b&d),a,b,x,s,t);
  const gg = (a,b,c,d,x,s,t) => cmn((b&d)|(c&~d),a,b,x,s,t);
  const hh = (a,b,c,d,x,s,t) => cmn(b^c^d,a,b,x,s,t);
  const ii = (a,b,c,d,x,s,t) => cmn(c^(b|~d),a,b,x,s,t);

  const utf8 = unescape(encodeURIComponent(str));
  const bytes = Array.from(utf8, c => c.charCodeAt(0));
  bytes.push(0x80);
  while (bytes.length % 64 !== 56) bytes.push(0);
  const bl = utf8.length * 8;
  bytes.push(bl&0xff,(bl>>>8)&0xff,(bl>>>16)&0xff,(bl>>>24)&0xff,0,0,0,0);

  let a=0x67452301,b=0xEFCDAB89,c=0x98BADCFE,d=0x10325476;
  for (let i = 0; i < bytes.length; i += 64) {
    const m = Array.from({length:16},(_,j)=>bytes[i+j*4]|(bytes[i+j*4+1]<<8)|(bytes[i+j*4+2]<<16)|(bytes[i+j*4+3]<<24));
    const [aa,bb,cc,dd]=[a,b,c,d];
    a=ff(a,b,c,d,m[0],7,-680876936);d=ff(d,a,b,c,m[1],12,-389564586);c=ff(c,d,a,b,m[2],17,606105819);b=ff(b,c,d,a,m[3],22,-1044525330);
    a=ff(a,b,c,d,m[4],7,-176418897);d=ff(d,a,b,c,m[5],12,1200080426);c=ff(c,d,a,b,m[6],17,-1473231341);b=ff(b,c,d,a,m[7],22,-45705983);
    a=ff(a,b,c,d,m[8],7,1770035416);d=ff(d,a,b,c,m[9],12,-1958414417);c=ff(c,d,a,b,m[10],17,-42063);b=ff(b,c,d,a,m[11],22,-1990404162);
    a=ff(a,b,c,d,m[12],7,1804603682);d=ff(d,a,b,c,m[13],12,-40341101);c=ff(c,d,a,b,m[14],17,-1502002290);b=ff(b,c,d,a,m[15],22,1236535329);
    a=gg(a,b,c,d,m[1],5,-165796510);d=gg(d,a,b,c,m[6],9,-1069501632);c=gg(c,d,a,b,m[11],14,643717713);b=gg(b,c,d,a,m[0],20,-373897302);
    a=gg(a,b,c,d,m[5],5,-701558691);d=gg(d,a,b,c,m[10],9,38016083);c=gg(c,d,a,b,m[15],14,-660478335);b=gg(b,c,d,a,m[4],20,-405537848);
    a=gg(a,b,c,d,m[9],5,568446438);d=gg(d,a,b,c,m[14],9,-1019803690);c=gg(c,d,a,b,m[3],14,-187363961);b=gg(b,c,d,a,m[8],20,1163531501);
    a=gg(a,b,c,d,m[13],5,-1444681467);d=gg(d,a,b,c,m[2],9,-51403784);c=gg(c,d,a,b,m[7],14,1735328473);b=gg(b,c,d,a,m[12],20,-1926607734);
    a=hh(a,b,c,d,m[5],4,-378558);d=hh(d,a,b,c,m[8],11,-2022574463);c=hh(c,d,a,b,m[11],16,1839030562);b=hh(b,c,d,a,m[14],23,-35309556);
    a=hh(a,b,c,d,m[1],4,-1530992060);d=hh(d,a,b,c,m[4],11,1272893353);c=hh(c,d,a,b,m[7],16,-155497632);b=hh(b,c,d,a,m[10],23,-1094730640);
    a=hh(a,b,c,d,m[13],4,681279174);d=hh(d,a,b,c,m[0],11,-358537222);c=hh(c,d,a,b,m[3],16,-722521979);b=hh(b,c,d,a,m[6],23,76029189);
    a=hh(a,b,c,d,m[9],4,-640364487);d=hh(d,a,b,c,m[12],11,-421815835);c=hh(c,d,a,b,m[15],16,530742520);b=hh(b,c,d,a,m[2],23,-995338651);
    a=ii(a,b,c,d,m[0],6,-198630844);d=ii(d,a,b,c,m[7],10,1126891415);c=ii(c,d,a,b,m[14],15,-1416354905);b=ii(b,c,d,a,m[5],21,-57434055);
    a=ii(a,b,c,d,m[12],6,1700485571);d=ii(d,a,b,c,m[3],10,-1894986606);c=ii(c,d,a,b,m[10],15,-1051523);b=ii(b,c,d,a,m[1],21,-2054922799);
    a=ii(a,b,c,d,m[8],6,1873313359);d=ii(d,a,b,c,m[15],10,-30611744);c=ii(c,d,a,b,m[6],15,-1560198380);b=ii(b,c,d,a,m[13],21,1309151649);
    a=ii(a,b,c,d,m[4],6,-145523070);d=ii(d,a,b,c,m[11],10,-1120210379);c=ii(c,d,a,b,m[2],15,718787259);b=ii(b,c,d,a,m[9],21,-343485551);
    a=safeAdd(a,aa);b=safeAdd(b,bb);c=safeAdd(c,cc);d=safeAdd(d,dd);
  }
  return [a,b,c,d].map(n=>[0,1,2,3].map(j=>('0'+((n>>>(j*8))&0xff).toString(16)).slice(-2)).join('')).join('');
}

/* ─── Config ─────────────────────────────────────────── */
const ALGOS = [
  { id:'MD5',    label:'MD5',    bits:'128', web:false },
  { id:'SHA-1',  label:'SHA-1',  bits:'160', web:true, subtle:'SHA-1'   },
  { id:'SHA-256',label:'SHA-256',bits:'256', web:true, subtle:'SHA-256' },
  { id:'SHA-384',label:'SHA-384',bits:'384', web:true, subtle:'SHA-384' },
  { id:'SHA-512',label:'SHA-512',bits:'512', web:true, subtle:'SHA-512' },
];

let activeAlgos = new Set(['MD5', 'SHA-256']);
let hashCache = {};

/* ─── Build UI ───────────────────────────────────────── */
function buildUI() {
  const grid = document.getElementById('algoGrid');
  ALGOS.forEach(a => {
    const btn = document.createElement('button');
    btn.className = 'algo-btn' + (activeAlgos.has(a.id) ? ' active' : '');
    btn.id = 'abtn-' + a.id;
    btn.title = a.web ? 'Uses Web Crypto API (SHA family)' : 'Pure JS — MD5 is legacy, avoid for security use';
    btn.innerHTML = `${a.label}<span class="algo-bits">${a.bits}b</span>`;
    btn.onclick = () => toggleAlgo(a.id);
    grid.appendChild(btn);
  });

  const cards = document.getElementById('hashCards');
  ALGOS.forEach(a => {
    const card = document.createElement('div');
    card.className = 'hash-card';
    card.id = 'card-' + a.id;
    card.style.display = activeAlgos.has(a.id) ? '' : 'none';
    card.innerHTML = `
      <div class="hash-card-header">
        <div class="algo-name">
          <div class="algo-dot" id="dot-${a.id}"></div>
          ${a.label}
          ${!a.web ? '<span class="legacy-tag">legacy</span>' : ''}
        </div>
        <span class="hash-meta">${a.bits}-bit · ${parseInt(a.bits)/4} hex chars</span>
      </div>
      <div class="hash-value-wrap">
        <span class="hash-value" id="hval-${a.id}">Waiting for input…</span>
      </div>
      <div class="hash-card-footer">
        <button class="btn copy" id="copy-${a.id}" onclick="copyHash('${a.id}')">⎘ Copy hash</button>
        <button class="btn ghost" style="font-size:0.72rem;" onclick="sendToCompare('${a.id}')">↓ Send to compare</button>
      </div>
    `;
    cards.appendChild(card);
  });
}

function toggleAlgo(id) {
  if (activeAlgos.has(id) && activeAlgos.size === 1) {
    toast('Keep at least one algorithm active.'); return;
  }
  activeAlgos.has(id) ? activeAlgos.delete(id) : activeAlgos.add(id);
  document.getElementById('abtn-' + id).classList.toggle('active', activeAlgos.has(id));
  document.getElementById('card-' + id).style.display = activeAlgos.has(id) ? '' : 'none';
  rehash();
}

/* ─── Hashing ────────────────────────────────────────── */
function ab2hex(buf) {
  return Array.from(new Uint8Array(buf), b => b.toString(16).padStart(2,'0')).join('');
}

async function computeHashes(text) {
  const enc = new TextEncoder();
  const data = enc.encode(text);
  const out = {};
  for (const a of ALGOS) {
    if (!activeAlgos.has(a.id)) continue;
    try {
      out[a.id] = a.web
        ? ab2hex(await crypto.subtle.digest(a.subtle, data))
        : md5(text);
    } catch(e) { out[a.id] = '(error: ' + e.message + ')'; }
  }
  return out;
}

let debounce;
function onInput() {
  const t = document.getElementById('inputText').value;
  const chars = t.length;
  const words = t.trim() ? t.trim().split(/\s+/).length : 0;
  document.getElementById('counters').textContent = `${chars.toLocaleString()} chars · ${words.toLocaleString()} words`;
  clearTimeout(debounce);
  debounce = setTimeout(rehash, 60);
}

async function rehash() {
  const text = document.getElementById('inputText').value;
  if (!text) {
    hashCache = {};
    ALGOS.forEach(a => setCard(a.id, null));
    doCompare();
    return;
  }
  const results = await computeHashes(text);
  hashCache = results;
  ALGOS.forEach(a => { if (activeAlgos.has(a.id)) setCard(a.id, results[a.id]); });
  doCompare();
}

function setCard(id, value) {
  const el   = document.getElementById('hval-' + id);
  const dot  = document.getElementById('dot-' + id);
  const card = document.getElementById('card-' + id);
  if (!value) {
    el.textContent = 'Waiting for input…';
    el.className   = 'hash-value';
    dot.className  = 'algo-dot';
    card.classList.remove('live');
  } else {
    el.textContent = value;
    el.className   = 'hash-value ready hash-animate';
    dot.className  = 'algo-dot ready';
    card.classList.add('live');
    setTimeout(() => el.classList.remove('hash-animate'), 350);
  }
}

/* ─── Copy ───────────────────────────────────────────── */
function copyHash(id) {
  const val = hashCache[id];
  if (!val) { toast('Nothing to copy yet.'); return; }
  navigator.clipboard.writeText(val).then(() => {
    const btn = document.getElementById('copy-' + id);
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '⎘ Copy hash'; btn.classList.remove('copied'); }, 1800);
  });
}

function sendToCompare(id) {
  const val = hashCache[id];
  if (!val) { toast('Generate a hash first.'); return; }
  document.getElementById('compareInput').value = val;
  doCompare();
  document.querySelector('.compare-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

/* ─── Compare ────────────────────────────────────────── */
function doCompare() {
  const input = document.getElementById('compareInput').value.trim().toLowerCase();
  const res   = document.getElementById('compareResult');
  if (!input) { res.className = 'compare-result idle'; return; }
  const entry = Object.entries(hashCache).find(([,v]) => v.toLowerCase() === input);
  if (entry) {
    res.className = 'compare-result match';
    res.innerHTML = `✓ Match — ${entry[0]}`;
  } else {
    res.className = 'compare-result no-match';
    res.innerHTML = `✗ No match with current hashes`;
  }
}

function clearCompare() {
  document.getElementById('compareInput').value = '';
  document.getElementById('compareResult').className = 'compare-result idle';
}

/* ─── Misc ───────────────────────────────────────────── */
async function pasteText() {
  try {
    const t = await navigator.clipboard.readText();
    document.getElementById('inputText').value = t;
    onInput();
  } catch { toast('Clipboard access denied — paste with Ctrl/Cmd+V.'); }
}

function clearAll() {
  document.getElementById('inputText').value = '';
  document.getElementById('counters').textContent = '0 chars · 0 words';
  clearCompare();
  hashCache = {};
  ALGOS.forEach(a => setCard(a.id, null));
  toast('Cleared.');
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

buildUI();
</script>
</body>
</html>
